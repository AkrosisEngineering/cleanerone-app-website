<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleanerOne User Agreement</title>
    <meta
      name="description"
      content="CleanerOne user agreement page."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="landing-shell legal-shell" data-legal-type="user">
    <div class="bg-orb bg-orb--teal"></div>
    <div class="bg-orb bg-orb--purple"></div>

    <header class="topbar">
      <a class="brand" href="../">
        <img src="../assets/app-icon.png" alt="" width="40" height="40" />
        <span>CleanerOne</span>
      </a>
      <div class="topbar-actions">
        <div class="lang-switch" role="group" aria-label="Language switch">
          <button class="lang-btn is-active" data-lang="en" type="button">EN</button>
          <button class="lang-btn" data-lang="tr" type="button">TR</button>
        </div>
        <a id="legal-other-link" class="btn btn--ghost" href="../privacy/">Privacy Policy</a>
        <a class="btn btn--primary" href="../">Back to Home</a>
      </div>
    </header>

    <main class="legal-main">
      <span id="legal-pill" class="pill">User Agreement</span>
      <h1 id="legal-title">User Agreement</h1>
      <section id="legal-content" class="legal-markdown"></section>
    </main>

    <script src="../legal.js"></script>
  </body>
</html>
